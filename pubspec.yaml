name: tameenidz
description: "Taminy Elite - Digital Islamic Takaful Insurance Platform"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^13.2.0

  # Backend
  supabase_flutter: ^2.12.4

  # File Handling
  file_picker: ^8.0.3
  image_picker: ^1.1.2

  # OTP
  flutter_otp_text_field: ^1.1.3

  # Utilities
  intl: ^0.19.0
  shared_preferences: ^2.2.3
  google_fonts: ^6.3.2
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  firebase_messaging: ^16.2.0
  flutter_local_notifications: ^19.5.0
  url_launcher: ^6.3.2
  share_plus: ^12.0.2
  path_provider: ^2.1.5
  screenshot: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  go_router_builder: ^2.4.1
  flutter_launcher_icons: ^0.13.1

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 21

